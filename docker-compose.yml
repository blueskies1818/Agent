# ── Agent Sandbox ─────────────────────────────────────────────────────────────
#
# Usage:
#   docker-compose up -d            Start the sandbox
#   docker-compose down             Stop and remove

version: "3.8"

services:
  sandbox:
    build: .
    image: agent-sandbox
    container_name: agent-sandbox
    restart: unless-stopped

    mem_limit: 2g
    shm_size: 1g
    pids_limit: 512

    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - FSETID
      - SETGID
      - SETUID
      - KILL
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

    network_mode: bridge

    volumes:
      - ${PROJECT:-./workspace}:/workspace